<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a73e8" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#1a73e8" media="(prefers-color-scheme: light)">
  <meta name="description" content="動画編集向け、開始・終了時刻を指定できる高機能ストップウォッチ">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TimeRangePro">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css">
  <title>TimeRangePro</title>
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3265952621594063" crossorigin="anonymous"></script>
</head>
<body>

<div class="app-container">

  <!-- ── Header ── -->
  <header class="app-header">
    <div class="app-logo">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="14" cy="15" r="10" stroke="var(--md-primary)" stroke-width="2"/>
        <line x1="14" y1="15" x2="14" y2="7" stroke="var(--md-primary)" stroke-width="2" stroke-linecap="round"/>
        <line x1="14" y1="15" x2="19" y2="17" stroke="var(--md-secondary)" stroke-width="1.5" stroke-linecap="round"/>
        <rect x="10" y="3" width="8" height="3" rx="1.5" fill="var(--md-primary)"/>
      </svg>
      <span class="app-title">TimeRange<span>Pro</span></span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btnShortcut" aria-label="ショートカット一覧" title="キーボードショートカット (?)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M11.07 12.85c.77-1.39 2.25-2.21 3.11-3.44.91-1.29.4-3.7-2.18-3.7-1.69 0-2.52 1.28-2.87 2.34L7.1 7.7C7.73 5.67 9.44 4 11.99 4c2.35 0 3.96 1.07 4.78 2.41.7 1.15 1.11 3.3.03 4.9-1.2 1.77-2.35 2.31-2.97 3.45-.25.46-.35.76-.35 2.24h-2.89c-.01-.78-.13-2.05.48-3.15zM14 20c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2z"/></svg>
        </button>
      <button class="icon-btn" id="btnTheme" aria-label="テーマ切替" title="ダーク/ライト切替">
        <!-- filled by app.js -->
      </button>
    </div>
  </header>

  <!-- ── Install Prompt ── -->
  <div class="install-prompt" id="installPrompt" style="display:none;">
    <div class="install-text">
      <strong>アプリとしてインストール</strong>
      ホーム画面に追加してオフラインでも使えます
    </div>
    <button class="btn btn-secondary btn-install" style="padding:0 14px;height:36px;font-size:0.82rem;">インストール</button>
    <button class="icon-btn btn-install-dismiss" aria-label="閉じる">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
  </div>

  <!-- ── Main ── -->
  <main class="main-content">

    <!-- ╔═ Timer Panel (outer card) ════════════════════╗ -->
    <section class="panel" aria-label="タイマー">

      <!-- ┌─ Display area ───────────────────────────┐ -->
      <div class="panel-display">
        <div class="timer-status" id="timerStatus">READY</div>
        <div class="timer-display" id="timerDisplay" aria-live="off">
          <span id="timerMain">00:00:00</span><span class="timer-ms" id="timerMs">.00</span>
        </div>

        <!-- Progress bar nested inside display -->
        <div class="panel-progress">
          <div class="progress-container" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <div class="progress-labels">
            <span id="progressStart">00:00:00</span>
            <span id="progressEnd">--:--:--</span>
          </div>
        </div>
      </div>
      <!-- └──────────────────────────────────────────┘ -->

      <!-- ┌─ Range settings (nested sub-panel) ──────┐ -->
      <div class="panel-settings">
        <div class="panel-settings-label">時刻範囲</div>
        <div class="range-inputs" aria-label="時刻範囲設定">
          <div class="input-group">
            <label class="input-label" for="inputStart">
              <span class="dot dot-start"></span>
              開始時刻
            </label>
            <input
              type="text"
              class="time-input"
              id="inputStart"
              placeholder="00:00:00.00"
              inputmode="decimal"
              autocomplete="off"
              spellcheck="false"
              aria-label="タイマー開始時刻"
            >
            <span class="input-hint">例: 01:23:45 / 1:23:45.50</span>
          </div>
          <div class="input-group">
            <label class="input-label" for="inputStop">
              <span class="dot dot-stop"></span>
              終了時刻
            </label>
            <input
              type="text"
              class="time-input"
              id="inputStop"
              placeholder="00:00:00.00"
              inputmode="decimal"
              autocomplete="off"
              spellcheck="false"
              aria-label="タイマー終了時刻（自動停止）"
            >
            <span class="input-hint">設定すると自動停止</span>
          </div>
        </div>
      </div>
      <!-- └──────────────────────────────────────────┘ -->

      <!-- ┌─ Controls ────────────────────────────────┐ -->
      <div class="panel-controls">
        <div class="controls" role="group" aria-label="タイマー操作">
          <button class="btn btn-primary" id="btnStartStop" aria-label="スタート">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            Start
          </button>
          <button class="btn btn-ghost" id="btnLap" disabled aria-label="ラップ">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>
            ラップ
          </button>
          <button class="btn btn-secondary" id="btnReset" disabled aria-label="リセット">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
            リセット
          </button>
        </div>
        <p class="shortcut-hint">
          <kbd class="kbd-inline">Space</kbd> スタート &nbsp;·&nbsp;
          <kbd class="kbd-inline">L</kbd> ラップ &nbsp;·&nbsp;
          <kbd class="kbd-inline">R</kbd> リセット &nbsp;·&nbsp;
          <kbd class="kbd-inline">C</kbd> コピー &nbsp;·&nbsp;
          <kbd class="kbd-inline">?</kbd> ヘルプ
        </p>
      </div>
      <!-- └──────────────────────────────────────────┘ -->

    </section>
    <!-- ╚═══════════════════════════════════════════════╝ -->

    <!-- ╔═ Lap Panel ════════════════════════════════════╗ -->
    <section class="panel panel-lap" aria-label="ラップ記録">
      <div class="panel-lap-header">
        <div class="panel-settings-label">ラップ記録</div>
        <span class="lap-count" id="lapCount">0</span>
      </div>
      <!-- ┌─ Lap list (inset) ────────────────────────┐ -->
      <div class="lap-list-inset">
        <div class="lap-list" id="lapList" role="list">
          <div class="lap-empty">ラップはまだありません</div>
        </div>
      </div>
      <!-- └──────────────────────────────────────────┘ -->
    </section>
    <!-- ╚═══════════════════════════════════════════════╝ -->

    <!-- Noads Banner -->
    <div class="noads-banner">
      <div class="noads-text">
        <strong>広告なしで使いたい？</strong>
        noads バージョンでは広告ゼロで快適に利用できます
      </div>
      <button class="btn-noads" id="btnGoNoads" aria-label="広告なしバージョンを開く">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7z"/></svg>
        広告なし版を開く
      </button>
    </div>

  </main>

  <footer class="app-footer">
    TimeRangePro &nbsp;·&nbsp; スペース: スタート &nbsp;·&nbsp; L: ラップ
  </footer>

</div>

<script>
  // ── Service Worker Registration ──────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  // ── noads Button: set one-time token ─────────────────
  document.getElementById('btnGoNoads').addEventListener('click', function () {
    // Set a one-time session token
    sessionStorage.setItem('trp_noads_token', '1');
    window.location.href = '/noads/';
  });
</script>
<script src="/app.js"></script>
</body>
</html>
